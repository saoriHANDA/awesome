<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Page</title>
    <style>
        /* 全体のスタイル設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        /* カード状のコンテナ */
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #666; font-size: 0.9rem; line-height: 1.6; }

        /* ボタン（リンク）のスタイル */
        .links { margin-top: 2rem; }
        .links a {
            display: block;
            background: #007AFF;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        /* ホバー（マウスを乗せた時）の動き */
        .links a:hover {
            background: #0051a8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World!</h1>
        <p>
            シンプルな静的サイトへようこそ。<br>
            HTMLとCSSだけで作られています。
        </p>
        
        <div class="links">
            <a href="#">About Me</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
        </div>
    </div>

</body>
</html>
